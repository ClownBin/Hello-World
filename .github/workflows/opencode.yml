name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
## step1：初始化opencode环境
## 1、初始化用户的执行脚本环境，如：支持用户自定义脚本执行；（用户通过配置一直可下载的路径）； 类似CICD+代码仓的场景 可以提前预置；
## 2、mcp/skill/provider(模型配置)需要激活的部分；（with参数如果比较多，支持一份json文件规范）
## 3、启动opencode server 常驻
## 4、执行用户脚本+命令

## step2：执行的任务项
## 1、用户自定义bash
      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/big-pickle
      
      - name: Check Workflow Status
        id: check
        uses: ClownBin/action-checkstatus@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 可选：在当前运行已完成且结果不是 success 时让步骤失败
          fail-on-non-success: "true"
          # 可选：自定义 token，不填则默认使用 GITHUB_TOKEN
          # github-token: ${{ secrets.MY_PAT }}

      - name: Echo result
        run: |
          echo "Run ID: ${{ steps.check.outputs['run-id'] }}"
          echo "Status: ${{ steps.check.outputs.status }}"
          echo "Conclusion: ${{ steps.check.outputs.conclusion }}"
